kind = "web"
previewPath = "/"
title = "Chrome New Tab Extension"
version = "1.0.0"
id = "artifacts/newtab-extension"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21149

[services.development]
run = "pnpm --filter @workspace/newtab-extension run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/newtab-extension", "run", "build" ]
publicDir = "artifacts/newtab-extension/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21149"
BASE_PATH = "/"
